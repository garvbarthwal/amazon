<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative; display:flex; flex-direction:column; width:100%; height:100%; background:#fff; border:1px solid #e7e7e7; border-radius:8px; padding:10px; box-sizing:border-box; font-family:Arial, Helvetica, sans-serif;">
  <div style="position:relative; height:170px; border-radius:6px; overflow:hidden; background:{{ tintBg }}; margin-bottom:8px;">
    <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:16px; text-align:center; box-sizing:border-box;">
      <span style="font-size:9.5px; font-weight:800; letter-spacing:0.09em; text-transform:uppercase; color:{{ tintFg }}; opacity:0.62; margin-bottom:6px;">{{ brand }}</span>
      <span style="font-size:15px; font-weight:800; color:{{ tintFg }}; line-height:1.22; text-wrap:balance;">{{ name }}</span>
      <span style="font-size:11px; font-weight:600; color:{{ tintFg }}; opacity:0.72; margin-top:7px;">{{ size }}</span>
    </div>
    {{ imageEl }}
    <div style="position:absolute; top:8px; left:8px; display:flex; align-items:center; gap:4px; background:rgba(19,25,33,0.88); color:#fff; font-size:11px; font-weight:700; padding:3px 8px; border-radius:20px;">
      <span style="width:6px; height:6px; border-radius:50%; background:#46e07f; display:inline-block;"></span>{{ deliveryMin }} min
    </div>
    <sc-if value="{{ hasDiscount }}" hint-placeholder-val="{{ true }}">
      <div style="position:absolute; top:8px; right:8px; background:#cc0c39; color:#fff; font-size:11px; font-weight:800; padding:3px 7px; border-radius:4px;">{{ discountStr }}</div>
    </sc-if>
  </div>
  <div onClick="{{ onOpen }}" style="cursor:pointer; flex:1; display:flex; flex-direction:column;">
    <div style="font-size:11px; font-weight:700; letter-spacing:0.04em; color:#8a8f94; text-transform:uppercase; margin-bottom:2px;">{{ brand }}</div>
    <div style="font-size:14px; font-weight:400; color:#0f1111; line-height:1.35; margin-bottom:6px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:38px;">{{ name }}</div>
    <div style="font-size:12px; color:#8a8f94; margin-bottom:6px;">{{ size }}</div>
    <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
      <span style="position:relative; display:inline-block; font-size:13px; letter-spacing:1px; color:#e3e6e6; height:16px;">★★★★★<span style="position:absolute; left:0; top:0; overflow:hidden; white-space:nowrap; color:#ffa41c; width:{{ starPct }};">★★★★★</span></span>
      <span style="font-size:12px; color:#007185;">({{ ratingCount }})</span>
    </div>
    <div style="display:flex; align-items:baseline; gap:6px; margin-top:auto;">
      <span style="font-size:13px; color:#0f1111;">₹</span>
      <span style="font-size:21px; font-weight:700; color:#0f1111; line-height:1;">{{ price }}</span>
      <sc-if value="{{ hasDiscount }}" hint-placeholder-val="{{ true }}"><span style="font-size:12px; color:#8a8f94; text-decoration:line-through;">₹{{ mrp }}</span></sc-if>
    </div>
  </div>
  <div style="margin-top:10px;">
    <sc-if value="{{ inCart }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex; align-items:center; justify-content:space-between; height:36px; background:linear-gradient(#f7dfa5,#f0c14b); border:1px solid #c89411; border-radius:20px; overflow:hidden;">
        <button onClick="{{ onDec }}" style="width:44px; height:100%; border:none; background:transparent; font-size:20px; font-weight:700; color:#3b2f00; cursor:pointer;">−</button>
        <span style="font-size:15px; font-weight:700; color:#0f1111;">{{ qty }}</span>
        <button onClick="{{ onInc }}" style="width:44px; height:100%; border:none; background:transparent; font-size:20px; font-weight:700; color:#3b2f00; cursor:pointer;">+</button>
      </div>
    </sc-if>
    <sc-if value="{{ notInCart }}" hint-placeholder-val="{{ true }}">
      <button onClick="{{ onAdd }}" style="width:100%; height:36px; background:linear-gradient(#f7dfa5,#f0c14b); border:1px solid #c89411; border-radius:20px; font-size:14px; font-weight:600; color:#0f1111; cursor:pointer;" style-hover="background:linear-gradient(#f5d78e,#eeb933);">Add</button>
    </sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:230,&quot;height&quot;:370},&quot;product&quot;:{&quot;editor&quot;:null,&quot;default&quot;:{&quot;brand&quot;:&quot;LIPTON&quot;,&quot;name&quot;:&quot;Lipton Iced Tea Lemon&quot;,&quot;size&quot;:&quot;250 ml&quot;,&quot;price&quot;:26,&quot;mrp&quot;:30,&quot;rating&quot;:4.3,&quot;ratingCount&quot;:885,&quot;deliveryMin&quot;:15,&quot;img&quot;:&quot;&quot;}},&quot;qty&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:0},&quot;onAdd&quot;:{&quot;editor&quot;:null},&quot;onInc&quot;:{&quot;editor&quot;:null},&quot;onDec&quot;:{&quot;editor&quot;:null},&quot;onOpen&quot;:{&quot;editor&quot;:null}}">
class Component extends DCLogic {
  state = { imgError: false };
  renderVals() {
    const p = this.props.product || {};
    const price = p.price ?? 0;
    const mrp = p.mrp ?? price;
    const hasDiscount = mrp > price;
    const discountStr = hasDiscount ? '-' + Math.round((1 - price / mrp) * 100) + '%' : '';
    const rating = p.rating ?? 0;
    const qty = this.props.qty ?? 0;
    const tint = p.tint || { bg: '#eef1f3', fg: '#37475a' };
    const showImg = !!p.img && !this.state.imgError;
    const imageEl = showImg
      ? React.createElement('img', { src: p.img, alt: p.name, onError: () => this.setState({ imgError: true }), style: { position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'contain', padding: '8px', boxSizing: 'border-box', background: '#fff' } })
      : null;
    return {
      imageEl,
      tintBg: tint.bg, tintFg: tint.fg,
      brand: p.brand || '', name: p.name || '', size: p.size || '',
      price, mrp, hasDiscount, discountStr,
      starPct: (rating / 5 * 100).toFixed(1) + '%',
      ratingCount: (p.ratingCount ?? 0).toLocaleString('en-IN'),
      deliveryMin: p.deliveryMin ?? 12,
      img: p.img || '', showImg,
      onImgError: () => this.setState({ imgError: true }),
      qty, inCart: qty > 0, notInCart: !(qty > 0),
      onAdd: this.props.onAdd || (() => {}),
      onInc: this.props.onInc || (() => {}),
      onDec: this.props.onDec || (() => {}),
      onOpen: this.props.onOpen || (() => {}),
    };
  }
}
</script>
</body>
</html>
